<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIFED · Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .login-wrap { width: 100%; max-width: 420px; padding: 20px; }

    /* Brand */
    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-logo {
      display: inline-block;
      width: 72px;
      height: 72px;
      margin-bottom: 16px;
    }
    .login-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 10px;
      background: white;
      padding: 6px;
    }
    .login-title {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 600;
      color: white;
      line-height: 1.25;
      letter-spacing: -0.3px;
    }
    .login-title span { color: #c9a81a; }

    /* Card */
    .login-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    }
    .login-card-top {
      background: linear-gradient(135deg, #16213e 0%, #1e2d5a 100%);
      border-bottom: 2px solid #b8960c;
      padding: 16px 24px;
    }
    .login-card-top h2 {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }
    .login-card-body { padding: 28px; }

    /* Form */
    .lf { margin-bottom: 18px; }
    .lf label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #777;
      margin-bottom: 7px;
    }
    .lf input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd9ce;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #16213e;
      background: #f6f5f1;
      outline: none;
    }
    .lf input:focus { border-color: #1a3f7a; background: white; }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: #16213e;
      color: white;
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 0.02em;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #1a3f7a; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-err {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #fdf0ef;
      border: 1px solid #f5c6c2;
      border-radius: 7px;
      font-size: 13px;
      color: #c0392b;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-logo">
      <img src="banderas/logo-aifed.png" alt="AIFED">
    </div>
    <h1 class="login-title">Intranet AIFED<br><span>Convocatorias</span></h1>
  </div>
  <div class="login-card">
    <div class="login-card-top">
      <h2>Identifícate para continuar</h2>
    </div>
    <div class="login-card-body">
      <div class="lf">
        <label>Usuario</label>
        <input type="text" id="u" placeholder="Nombre de usuario" autocomplete="off">
      </div>
      <div class="lf">
        <label>Contraseña</label>
        <input type="password" id="p" placeholder="••••••••" autocomplete="off">
      </div>
      <button class="login-btn" id="btn" type="button">Entrar →</button>
      <div class="login-err" id="err"></div>
    </div>
  </div>
</div>
<script>
  var btn = document.getElementById('btn');
  var uEl = document.getElementById('u');
  var pEl = document.getElementById('p');
  var err = document.getElementById('err');

  btn.addEventListener('click', hacerLogin);
  uEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); pEl.focus(); } });
  pEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); hacerLogin(); } });

  function hacerLogin() {
    var usuario  = uEl.value.trim();
    var password = pEl.value;
    err.style.display = 'none';
    if (!usuario || !password) { err.textContent='Introduce usuario y contraseña.'; err.style.display='block'; return; }
    btn.textContent = 'Verificando...';
    btn.disabled = true;
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/login', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      btn.textContent = 'Entrar →';
      btn.disabled = false;
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.ok && data.token) {
          sessionStorage.setItem('bdns_token',   data.token);
          sessionStorage.setItem('bdns_usuario', data.usuario);
          sessionStorage.setItem('bdns_rol',     data.rol || 'usuario');
          const rol = data.rol || 'usuario';
          window.location.href = '/index.html';
        } else {
          pEl.value = '';
          err.textContent = data.error || 'Usuario o contraseña incorrectos. (HTTP ' + xhr.status + ')';
          err.style.display = 'block';
        }
      } catch(e) {
        err.textContent = 'Error de conexión. ¿Está arrancado el servidor? (' + xhr.status + ')';
        err.style.display = 'block';
      }
    };
    xhr.send(JSON.stringify({ usuario: usuario, password: password }));
  }
</script>
</body>
</html>
