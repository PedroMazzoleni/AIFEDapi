<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BDNS · Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background:#16213e; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-wrap { width:100%; max-width:420px; padding:20px; }
    .login-brand { text-align:center; margin-bottom:28px; }
    .login-seal { display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px; background:#b8960c; color:#16213e; font-family:var(--mono,monospace); font-size:11px; border-radius:6px; margin-bottom:12px; font-weight:600; }
    .login-ministry { display:block; font-family:var(--mono,monospace); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:6px; }
    .login-title { font-family:var(--serif,serif); font-size:20px; font-weight:300; color:white; line-height:1.3; }
    .login-title span { color:#c9a81a; }
    .login-card { background:white; border-radius:10px; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,0.4); }
    .login-card-top { background:linear-gradient(135deg,#16213e 0%,#1e2d5a 100%); border-bottom:2px solid #b8960c; padding:16px 24px; }
    .login-card-top h2 { font-family:var(--mono,monospace); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.5); font-weight:400; margin:0; }
    .login-card-body { padding:24px; }
    .lf { margin-bottom:16px; }
    .lf label { display:block; font-family:var(--mono,monospace); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:#888; margin-bottom:6px; }
    .lf input { width:100%; padding:10px 13px; border:1.5px solid #ddd9ce; border-radius:6px; font-family:var(--sans,sans-serif); font-size:14px; color:#16213e; background:#f6f5f1; outline:none; box-sizing:border-box; }
    .lf input:focus { border-color:#1a3f7a; background:white; }
    .login-btn { width:100%; padding:12px; background:#16213e; color:white; border:none; border-radius:6px; font-family:var(--sans,sans-serif); font-size:14px; font-weight:500; cursor:pointer; margin-top:4px; }
    .login-btn:hover { background:#1a3f7a; }
    .login-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .login-err { display:none; margin-top:12px; padding:9px 13px; background:#fdf0ef; border:1px solid #f5c6c2; border-radius:6px; font-size:12px; color:#c0392b; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-seal">BOE</div>
    <span class="login-ministry">Ministerio de Hacienda · IGAE · España</span>
    <h1 class="login-title">Base de Datos Nacional<br>de <span>Subvenciones</span></h1>
  </div>
  <div class="login-card">
    <div class="login-card-top">
      <h2>🔐 Acceso restringido — identifícate para continuar</h2>
    </div>
    <div class="login-card-body">
      <div class="lf">
        <label>Usuario</label>
        <input type="text" id="u" placeholder="Nombre de usuario" autocomplete="off">
      </div>
      <div class="lf">
        <label>Contraseña</label>
        <input type="password" id="p" placeholder="••••••••" autocomplete="off">
      </div>
      <button class="login-btn" id="btn" type="button">Entrar →</button>
      <div class="login-err" id="err"></div>
    </div>
  </div>
</div>
<script>
  var btn = document.getElementById('btn');
  var uEl = document.getElementById('u');
  var pEl = document.getElementById('p');
  var err = document.getElementById('err');

  btn.addEventListener('click', hacerLogin);
  uEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); pEl.focus(); } });
  pEl.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); hacerLogin(); } });

  function hacerLogin() {
    var usuario  = uEl.value.trim();
    var password = pEl.value;
    err.style.display = 'none';
    if (!usuario || !password) { err.textContent='Introduce usuario y contraseña.'; err.style.display='block'; return; }
    btn.textContent = 'Verificando...';
    btn.disabled = true;
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/login', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      btn.textContent = 'Entrar →';
      btn.disabled = false;
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.ok && data.token) {
          sessionStorage.setItem('bdns_token',   data.token);
          sessionStorage.setItem('bdns_usuario', data.usuario);
          sessionStorage.setItem('bdns_rol',     data.rol || 'usuario');
          const rol = data.rol || 'usuario';
            window.location.href = '/index.html';
        } else {
          pEl.value = '';
          err.textContent = data.error || 'Usuario o contraseña incorrectos. (HTTP ' + xhr.status + ')';
          err.style.display = 'block';
        }
      } catch(e) {
        err.textContent = 'Error de conexión. ¿Está arrancado el servidor? (' + xhr.status + ')';
        err.style.display = 'block';
      }
    };
    xhr.send(JSON.stringify({ usuario: usuario, password: password }));
  }
</script>
</body>
</html>
