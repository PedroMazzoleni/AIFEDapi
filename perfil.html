<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIFED · Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="perfil.css">
</head>
<body>

<!-- CABECERA -->
<div class="perfil-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:36px;height:36px;border-radius:6px;overflow:hidden;background:white;padding:3px;flex-shrink:0;"><img src="banderas/logo-aifed.png" style="width:100%;height:100%;object-fit:contain;"></div>
    <span style="font-family:var(--serif);font-size:18px;font-weight:300;color:white;">Perfil</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <span style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.3);"><span id="usuarioActual"></span></span>
    <a href="/index.html" class="back-link">← Buscador</a>
    <button onclick="logout()" style="background:transparent;border:1px solid rgba(192,57,43,0.4);color:rgba(192,57,43,0.7);font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer;">Salir</button>
  </div>
</div>

<div class="perfil-wrap">

  <!-- TARJETA IDENTIDAD -->
  <div class="id-card" id="idCard">
    <div class="id-avatar" id="idAvatar">—</div>
    <div class="id-info">
      <div class="id-nombre" id="idNombre">Cargando…</div>
      <div class="id-cargo" id="idCargo"></div>
      <div class="id-pills" id="idPills"></div>
    </div>
    <div class="id-actions" id="idActions"></div>
  </div>

  <!-- DOS COLUMNAS -->
  <div class="two-col">

    <!-- COL IZQ: datos personales -->
    <div class="p-card">
      <div class="p-card-head">
        <span class="p-card-title">Datos personales</span>
        <span id="editBtnWrap"></span>
      </div>
      <div class="p-card-body">
        <div id="perfilForm"></div>
        <div class="msg" id="msgPerfil"></div>
      </div>
    </div>

    <!-- COL DCH: tabs -->
    <div class="p-card" style="overflow:visible;">
      <div class="tabs" id="tabs">
        <div class="tab active" data-tab="anotaciones" onclick="switchTab('anotaciones')">Anotaciones</div>
        <div class="tab" data-tab="proyectos"   onclick="switchTab('proyectos')">Proyectos</div>
        <div class="tab" data-tab="tareas"      onclick="switchTab('tareas')">Tareas</div>
        <div class="tab" data-tab="archivos"    onclick="switchTab('archivos')">Archivos</div>
      </div>

      <!-- ANOTACIONES -->
      <div class="tab-panel active" id="panel-anotaciones">
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
          <button class="btn btn-sm btn-ghost" onclick="toggleForm('form-anotacion')">+ Añadir</button>
        </div>
        <div class="add-form" id="form-anotacion">
          <div class="add-form-group">
            <label>Texto</label>
            <textarea id="new-anot-texto" placeholder="Escribe tu anotación…" rows="3"></textarea>
          </div>
          <div class="add-form-btns">
            <button class="btn btn-sm btn-primary" onclick="crearAnotacion()">Guardar</button>
            <button class="btn btn-sm btn-ghost" onclick="toggleForm('form-anotacion')">Cancelar</button>
          </div>
          <div class="msg" id="msg-anotacion"></div>
        </div>
        <div class="item-list" id="list-anotaciones"><div class="empty">Cargando…</div></div>
      </div>

      <!-- PROYECTOS -->
      <div class="tab-panel" id="panel-proyectos">
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
          <button class="btn btn-sm btn-ghost" onclick="toggleForm('form-proyecto')">+ Añadir</button>
        </div>
        <div class="add-form" id="form-proyecto">
          <div class="add-form-row">
            <div class="add-form-group" style="flex:2;">
              <label>Nombre del proyecto</label>
              <input type="text" id="new-proy-nombre" placeholder="Nombre">
            </div>
            <div class="add-form-group">
              <label>Estado</label>
              <select id="new-proy-estado">
                <option value="activo">Activo</option>
                <option value="pausado">Pausado</option>
                <option value="completado">Completado</option>
              </select>
            </div>
          </div>
          <div class="add-form-row">
            <div class="add-form-group">
              <label>Inicio</label>
              <input type="date" id="new-proy-inicio">
            </div>
            <div class="add-form-group">
              <label>Fin previsto</label>
              <input type="date" id="new-proy-fin">
            </div>
          </div>
          <div class="add-form-group">
            <label>Descripción</label>
            <textarea id="new-proy-desc" placeholder="Descripción opcional…" rows="2"></textarea>
          </div>
          <div class="add-form-btns">
            <button class="btn btn-sm btn-primary" onclick="crearProyecto()">Guardar</button>
            <button class="btn btn-sm btn-ghost" onclick="toggleForm('form-proyecto')">Cancelar</button>
          </div>
          <div class="msg" id="msg-proyecto"></div>
        </div>
        <div class="item-list" id="list-proyectos"><div class="empty">Cargando…</div></div>
      </div>

      <!-- TAREAS -->
      <div class="tab-panel" id="panel-tareas">
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
          <button class="btn btn-sm btn-ghost" onclick="toggleForm('form-tarea')">+ Añadir</button>
        </div>
        <div class="add-form" id="form-tarea">
          <div class="add-form-row">
            <div class="add-form-group" style="flex:2;">
              <label>Título</label>
              <input type="text" id="new-tarea-titulo" placeholder="Título de la tarea">
            </div>
            <div class="add-form-group">
              <label>Prioridad</label>
              <select id="new-tarea-prioridad">
                <option value="baja">Baja</option>
                <option value="media" selected>Media</option>
                <option value="alta">Alta</option>
              </select>
            </div>
            <div class="add-form-group">
              <label>Estado</label>
              <select id="new-tarea-estado">
                <option value="pendiente">Pendiente</option>
                <option value="en_progreso">En progreso</option>
                <option value="completada">Completada</option>
              </select>
            </div>
          </div>
          <div class="add-form-row">
            <div class="add-form-group">
              <label>Fecha límite</label>
              <input type="date" id="new-tarea-limite">
            </div>
            <div class="add-form-group" style="flex:2;">
              <label>Descripción</label>
              <input type="text" id="new-tarea-desc" placeholder="Descripción opcional">
            </div>
          </div>
          <div class="add-form-btns">
            <button class="btn btn-sm btn-primary" onclick="crearTarea()">Guardar</button>
            <button class="btn btn-sm btn-ghost" onclick="toggleForm('form-tarea')">Cancelar</button>
          </div>
          <div class="msg" id="msg-tarea"></div>
        </div>
        <div class="item-list" id="list-tareas"><div class="empty">Cargando…</div></div>
      </div>

      <!-- ARCHIVOS -->
      <div class="tab-panel" id="panel-archivos">
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
          <button class="btn btn-sm btn-ghost" onclick="toggleForm('form-archivo')">+ Añadir enlace</button>
        </div>
        <div class="add-form" id="form-archivo">
          <div class="add-form-row">
            <div class="add-form-group" style="flex:2;">
              <label>Nombre del archivo</label>
              <input type="text" id="new-arch-nombre" placeholder="Ej: Memoria del proyecto">
            </div>
            <div class="add-form-group">
              <label>Tipo</label>
              <select id="new-arch-tipo">
                <option value="PDF">PDF</option>
                <option value="Word">Word</option>
                <option value="Excel">Excel</option>
                <option value="Imagen">Imagen</option>
                <option value="Otro">Otro</option>
              </select>
            </div>
          </div>
          <div class="add-form-group">
            <label>URL del archivo</label>
            <input type="url" id="new-arch-url" placeholder="https://…">
          </div>
          <div class="add-form-btns">
            <button class="btn btn-sm btn-primary" onclick="crearArchivo()">Guardar</button>
            <button class="btn btn-sm btn-ghost" onclick="toggleForm('form-archivo')">Cancelar</button>
          </div>
          <div class="msg" id="msg-archivo"></div>
        </div>
        <div class="item-list" id="list-archivos"><div class="empty">Cargando…</div></div>
      </div>

    </div><!-- /p-card tabs -->
  </div><!-- /two-col -->
</div><!-- /perfil-wrap -->

<script src="auth.js"></script>
<script>
// ── Estado global ─────────────────────────────────────────
const miRol      = sessionStorage.getItem('bdns_rol') || 'usuario';
const miUsuario  = sessionStorage.getItem('bdns_usuario') || '';
const params     = new URLSearchParams(window.location.search);
// Si hay ?id=X y soy admin, veo ese perfil; si no, el mío
let targetId     = params.get('id') ? parseInt(params.get('id')) : null;
let perfilData   = null;
let editando     = false;

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await cargarPerfil();
});

// ── Cargar perfil ─────────────────────────────────────────
async function cargarPerfil() {
  const url = targetId ? `/api/perfil/${targetId}` : '/api/perfil';
  const res  = await fetch(url);
  const data = await res.json();
  if (!res.ok) { alert(data.error || 'Error al cargar perfil'); return; }
  perfilData = data;
  targetId   = data.id;
  renderIdentidad();
  renderFormPerfil();
  cargarAnotaciones();
  cargarProyectos();
  cargarTareas();
  cargarArchivos();
}

// ── Identidad ─────────────────────────────────────────────
function renderIdentidad() {
  const d = perfilData;
  const nombreCompleto = [d.nombre, d.apellidos].filter(Boolean).join(' ') || d.usuario;
  document.getElementById('idAvatar').textContent = nombreCompleto.charAt(0).toUpperCase();
  document.getElementById('idNombre').textContent = nombreCompleto;
  document.getElementById('idCargo').textContent  = [d.cargo, d.departamento].filter(Boolean).join(' · ') || '';
  const pills = [];
  if (d.documento) pills.push(`DNI: ${d.documento}`);
  if (d.telefono)  pills.push(`Tel: ${d.telefono}`);
  pills.push(d.rol === 'admin' ? '🔑 Admin' : d.rol === 'gestor' ? '📋 Gestor' : '👤 Usuario');
  document.getElementById('idPills').innerHTML = pills.map((p,i) => `<span class="id-pill ${i===pills.length-1?'gold':''}">${p}</span>`).join('');

  // Botón volver al admin si soy admin viendo otro perfil
  const actions = document.getElementById('idActions');
  if (miRol === 'admin' && targetId) {
    actions.innerHTML = `<a href="/admin.html" class="btn btn-sm btn-ghost" style="color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.15);">← Admin</a>`;
  }
}

// ── Formulario perfil ────────────────────────────────────
function renderFormPerfil() {
  const d = perfilData;
  const puedeEditar = miRol === 'admin';
  const campos = [
    { key:'nombre',       label:'Nombre',       type:'text' },
    { key:'apellidos',    label:'Apellidos',     type:'text' },
    { key:'documento',    label:'Documento / DNI', type:'text' },
    { key:'telefono',     label:'Teléfono',      type:'text' },
    { key:'cargo',        label:'Cargo',         type:'text' },
    { key:'departamento', label:'Departamento',  type:'text' },
  ];

  const btnWrap = document.getElementById('editBtnWrap');
  if (puedeEditar) {
    btnWrap.innerHTML = `<button class="btn btn-sm btn-ghost" id="btnEdit" onclick="toggleEdit()">✏ Editar</button>`;
  }

  document.getElementById('perfilForm').innerHTML = campos.map(c => `
    <div class="field-row">
      <div class="field-label">${c.label}</div>
      ${puedeEditar
        ? `<input class="field-input" type="${c.type}" id="pf-${c.key}" value="${esc(d[c.key]||'')}" disabled>`
        : `<div class="field-val">${esc(d[c.key] || '') || '—'}</div>`
      }
    </div>
  `).join('');
}

function toggleEdit() {
  editando = !editando;
  const campos = ['nombre','apellidos','documento','telefono','cargo','departamento'];
  campos.forEach(k => {
    const el = document.getElementById(`pf-${k}`);
    if (el) el.disabled = !editando;
  });
  const btn = document.getElementById('btnEdit');
  if (editando) {
    btn.textContent = '✕ Cancelar';
    btn.style.color = 'var(--red)';
    // Añadir botón guardar
    const wrap = document.getElementById('editBtnWrap');
    wrap.innerHTML += ` <button class="btn btn-sm btn-primary" id="btnSave" onclick="guardarPerfil()">💾 Guardar</button>`;
  } else {
    renderFormPerfil(); // reset
    document.getElementById('msgPerfil').className = 'msg';
  }
}

async function guardarPerfil() {
  const body = {};
  ['nombre','apellidos','documento','telefono','cargo','departamento'].forEach(k => {
    const el = document.getElementById(`pf-${k}`);
    if (el) body[k] = el.value.trim() || null;
  });
  const res  = await fetch(`/api/perfil/${targetId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await res.json();
  const msg  = document.getElementById('msgPerfil');
  if (data.ok) {
    perfilData = { ...perfilData, ...body };
    renderIdentidad();
    editando = false;
    renderFormPerfil();
    msg.textContent = '✓ Guardado correctamente'; msg.className = 'msg ok';
    setTimeout(() => msg.className = 'msg', 3000);
  } else {
    msg.textContent = data.error || 'Error al guardar'; msg.className = 'msg err';
  }
}

// ── Tabs ──────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${name}`));
}

function toggleForm(id) {
  const f = document.getElementById(id);
  f.classList.toggle('open');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type}`;
  setTimeout(() => el.className = 'msg', 3000);
}

// ── ANOTACIONES ───────────────────────────────────────────
async function cargarAnotaciones() {
  const res  = await fetch(`/api/perfil/${targetId}/anotaciones`);
  const data = await res.json();
  const list = document.getElementById('list-anotaciones');
  if (!data.length) { list.innerHTML = '<div class="empty">Sin anotaciones</div>'; return; }
  list.innerHTML = data.map(a => `
    <div class="item">
      <div class="item-body">
        <div class="item-desc" style="white-space:pre-wrap;">${esc(a.texto)}</div>
        <div class="item-meta">${fmtDate(a.created_at)}</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-sm btn-danger" onclick="eliminar('anotaciones',${a.id})">✕</button>
      </div>
    </div>
  `).join('');
}

async function crearAnotacion() {
  const texto = document.getElementById('new-anot-texto').value.trim();
  if (!texto) return showMsg('msg-anotacion', 'Escribe algo', 'err');
  const res = await fetch(`/api/perfil/${targetId}/anotaciones`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ texto }) });
  const d   = await res.json();
  if (d.ok) { document.getElementById('new-anot-texto').value=''; toggleForm('form-anotacion'); cargarAnotaciones(); }
  else showMsg('msg-anotacion', d.error||'Error', 'err');
}

// ── PROYECTOS ─────────────────────────────────────────────
const ESTADO_PROY = { activo:'badge-green', pausado:'badge-gold', completado:'badge-blue' };

async function cargarProyectos() {
  const res  = await fetch(`/api/perfil/${targetId}/proyectos`);
  const data = await res.json();
  const list = document.getElementById('list-proyectos');
  if (!data.length) { list.innerHTML = '<div class="empty">Sin proyectos</div>'; return; }
  list.innerHTML = data.map(p => `
    <div class="item">
      <div class="item-body">
        <div class="item-titulo">${esc(p.nombre)} <span class="badge ${ESTADO_PROY[p.estado]||'badge-gray'}">${p.estado}</span></div>
        ${p.descripcion ? `<div class="item-desc">${esc(p.descripcion)}</div>` : ''}
        <div class="item-meta">${p.fecha_inicio||''} ${p.fecha_fin ? '→ '+p.fecha_fin : ''}</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-sm btn-danger" onclick="eliminar('proyectos',${p.id})">✕</button>
      </div>
    </div>
  `).join('');
}

async function crearProyecto() {
  const nombre = document.getElementById('new-proy-nombre').value.trim();
  if (!nombre) return showMsg('msg-proyecto', 'El nombre es obligatorio', 'err');
  const body = {
    nombre,
    estado:       document.getElementById('new-proy-estado').value,
    descripcion:  document.getElementById('new-proy-desc').value.trim() || null,
    fecha_inicio: document.getElementById('new-proy-inicio').value || null,
    fecha_fin:    document.getElementById('new-proy-fin').value || null,
  };
  const res = await fetch(`/api/perfil/${targetId}/proyectos`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const d   = await res.json();
  if (d.ok) { toggleForm('form-proyecto'); cargarProyectos(); }
  else showMsg('msg-proyecto', d.error||'Error', 'err');
}

// ── TAREAS ────────────────────────────────────────────────
const PRIOR_BADGE = { baja:'badge-blue', media:'badge-gold', alta:'badge-red' };
const ESTADO_TAREA = { pendiente:'badge-gray', en_progreso:'badge-warn', completada:'badge-green' };

async function cargarTareas() {
  const res  = await fetch(`/api/perfil/${targetId}/tareas`);
  const data = await res.json();
  const list = document.getElementById('list-tareas');
  if (!data.length) { list.innerHTML = '<div class="empty">Sin tareas</div>'; return; }
  list.innerHTML = data.map(t => `
    <div class="item">
      <div class="item-body">
        <div class="item-titulo">
          ${esc(t.titulo)}
          <span class="badge ${PRIOR_BADGE[t.prioridad]||'badge-gray'}">${t.prioridad}</span>
          <span class="badge ${ESTADO_TAREA[t.estado]||'badge-gray'}">${t.estado.replace('_',' ')}</span>
        </div>
        ${t.descripcion ? `<div class="item-desc">${esc(t.descripcion)}</div>` : ''}
        ${t.fecha_limite ? `<div class="item-meta">Límite: ${t.fecha_limite}</div>` : ''}
      </div>
      <div class="item-actions">
        <button class="btn btn-sm btn-danger" onclick="eliminar('tareas',${t.id})">✕</button>
      </div>
    </div>
  `).join('');
}

async function crearTarea() {
  const titulo = document.getElementById('new-tarea-titulo').value.trim();
  if (!titulo) return showMsg('msg-tarea', 'El título es obligatorio', 'err');
  const body = {
    titulo,
    prioridad:    document.getElementById('new-tarea-prioridad').value,
    estado:       document.getElementById('new-tarea-estado').value,
    descripcion:  document.getElementById('new-tarea-desc').value.trim() || null,
    fecha_limite: document.getElementById('new-tarea-limite').value || null,
  };
  const res = await fetch(`/api/perfil/${targetId}/tareas`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const d   = await res.json();
  if (d.ok) { toggleForm('form-tarea'); cargarTareas(); }
  else showMsg('msg-tarea', d.error||'Error', 'err');
}

// ── ARCHIVOS ──────────────────────────────────────────────
const TIPO_BADGE = { PDF:'badge-red', Word:'badge-blue', Excel:'badge-green', Imagen:'badge-gold', Otro:'badge-gray' };

async function cargarArchivos() {
  const res  = await fetch(`/api/perfil/${targetId}/archivos`);
  const data = await res.json();
  const list = document.getElementById('list-archivos');
  if (!data.length) { list.innerHTML = '<div class="empty">Sin archivos</div>'; return; }
  list.innerHTML = data.map(a => `
    <div class="item">
      <div class="item-body">
        <div class="item-titulo">
          <span class="badge ${TIPO_BADGE[a.tipo]||'badge-gray'}">${a.tipo||'Archivo'}</span>
          ${esc(a.nombre)}
        </div>
        <div><a class="url-link" href="${esc(a.url)}" target="_blank">${esc(a.url)}</a></div>
        <div class="item-meta">${fmtDate(a.created_at)}</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-sm btn-danger" onclick="eliminar('archivos',${a.id})">✕</button>
      </div>
    </div>
  `).join('');
}

async function crearArchivo() {
  const nombre = document.getElementById('new-arch-nombre').value.trim();
  const url    = document.getElementById('new-arch-url').value.trim();
  if (!nombre || !url) return showMsg('msg-archivo', 'Nombre y URL son obligatorios', 'err');
  const body = { nombre, url, tipo: document.getElementById('new-arch-tipo').value };
  const res  = await fetch(`/api/perfil/${targetId}/archivos`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const d    = await res.json();
  if (d.ok) { toggleForm('form-archivo'); cargarArchivos(); }
  else showMsg('msg-archivo', d.error||'Error', 'err');
}

// ── Eliminar genérico ─────────────────────────────────────
async function eliminar(tipo, id) {
  if (!confirm('¿Eliminar este elemento?')) return;
  const res  = await fetch(`/api/perfil/${targetId}/${tipo}/${id}`, { method:'DELETE' });
  const data = await res.json();
  if (data.ok) {
    if (tipo === 'anotaciones') cargarAnotaciones();
    if (tipo === 'proyectos')   cargarProyectos();
    if (tipo === 'tareas')      cargarTareas();
    if (tipo === 'archivos')    cargarArchivos();
  } else alert(data.error || 'Error al eliminar');
}

// ── Utils ─────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('es-ES', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
</script>
</body>
</html>
