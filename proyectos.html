<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BDNS · Proyectos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Header ── */
    .proy-header {
      background: var(--ink); border-bottom: 3px solid var(--gold);
      padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Layout ── */
    .proy-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 32px 64px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Toolbar ── */
    .proy-toolbar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 20px;
    }
    .proy-toolbar-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .proy-search { padding: 7px 12px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--sans); font-size: 13px; color: var(--ink); background: var(--paper); outline: none; width: 220px; }
    .proy-search:focus { border-color: var(--blue-mid); background: white; }
    .filter-chip { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; color: var(--ink-faint); background: transparent; transition: all 0.12s; }
    .filter-chip:hover { border-color: var(--ink-mid); color: var(--ink-mid); }
    .filter-chip.active { background: var(--ink); color: white; border-color: var(--ink); }

    /* ── Grid proyectos ── */
    .proy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

    /* ── Tarjeta proyecto ── */
    .proy-card {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--r);
      display: flex; flex-direction: column; overflow: hidden;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .proy-card:hover { box-shadow: var(--shadow); border-color: var(--border); }
    .proy-card-stripe { height: 3px; }
    .stripe-activo    { background: var(--green); }
    .stripe-pausado   { background: var(--gold); }
    .stripe-completado { background: var(--blue); }

    .proy-card-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .proy-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .proy-card-nombre { font-family: var(--serif); font-size: 16px; font-weight: 400; color: var(--ink); line-height: 1.3; }
    .proy-card-cliente { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); margin-top: 2px; }
    .proy-card-desc { font-size: 12px; color: var(--ink-mid); line-height: 1.5; }
    .proy-card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
    .proy-card-fechas { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); }

    /* ── Miembros avatares ── */
    .miembros-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .miembro-av {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--ink); color: white;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 11px; font-weight: 600;
      border: 2px solid white; margin-left: -6px; cursor: default;
      flex-shrink: 0;
    }
    .miembro-av:first-child { margin-left: 0; }
    .miembro-av.responsable { background: var(--gold); color: var(--ink); }
    .miembro-av-more { background: var(--paper-warm); color: var(--ink-faint); font-family: var(--mono); font-size: 9px; }
    .miembros-empty { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); }

    .proy-card-actions { padding: 10px 18px; border-top: 1px solid var(--border-light); display: flex; gap: 6px; background: var(--paper); }

    /* ── Badges ── */
    .badge { display: inline-flex; font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; font-weight: 500; }
    .badge-green  { background: var(--green-light);  color: var(--green);    border: 1px solid var(--green); }
    .badge-blue   { background: var(--blue-light);   color: var(--blue);     border: 1px solid var(--blue); }
    .badge-gold   { background: var(--gold-light);   color: var(--gold);     border: 1px solid var(--gold); }
    .badge-warn   { background: var(--warn-light);   color: var(--warn);     border: 1px solid var(--warn); }
    .badge-red    { background: var(--red-light);    color: var(--red);      border: 1px solid var(--red); }
    .badge-gray   { background: var(--paper-warm);   color: var(--ink-faint);border: 1px solid var(--border); }

    /* ── Botones ── */
    .btn { padding: 7px 16px; border: none; border-radius: 4px; font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .btn-primary { background: var(--ink); color: white; }
    .btn-primary:hover { background: var(--blue); }
    .btn-sm { padding: 5px 11px; font-size: 11px; }
    .btn-ghost { background: transparent; color: var(--ink-mid); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--ink-mid); color: var(--ink); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(122,26,26,0.3); }
    .btn-danger:hover { background: var(--red-light); }
    .btn-green { background: var(--green); color: white; }
    .btn-green:hover { opacity: 0.88; }

    /* ── Modal ── */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(22,33,62,0.55); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: white; border-radius: var(--r); width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.25); }
    .modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: white; z-index: 1; }
    .modal-title { font-family: var(--serif); font-size: 18px; font-weight: 300; color: var(--ink); }
    .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--ink-faint); padding: 4px 8px; border-radius: 4px; }
    .modal-close:hover { background: var(--paper); }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border-light); display: flex; gap: 8px; justify-content: flex-end; background: var(--paper); border-radius: 0 0 var(--r) var(--r); }

    /* ── Formulario ── */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
    .form-group label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); }
    .form-group input,
    .form-group select,
    .form-group textarea { padding: 8px 11px; border: 1.5px solid var(--border); border-radius: 4px; font-family: var(--sans); font-size: 13px; color: var(--ink); background: white; outline: none; width: 100%; }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--blue-mid); }
    .form-group textarea { resize: vertical; min-height: 72px; }

    /* ── Asignación de miembros ── */
    .miembros-section { border: 1px solid var(--border-light); border-radius: 4px; overflow: hidden; }
    .miembros-section-head { padding: 10px 14px; background: var(--paper); border-bottom: 1px solid var(--border-light); font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); display: flex; justify-content: space-between; align-items: center; }
    .miembro-item { padding: 8px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-light); }
    .miembro-item:last-child { border-bottom: none; }
    .miembro-item-av { width: 28px; height: 28px; border-radius: 50%; background: var(--ink); color: white; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 12px; flex-shrink: 0; }
    .miembro-item-info { flex: 1; }
    .miembro-item-nombre { font-size: 13px; color: var(--ink); font-weight: 500; }
    .miembro-item-rol { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); }

    .add-miembro-row { padding: 10px 14px; display: flex; gap: 8px; background: var(--paper-warm); }
    .add-miembro-row select { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--sans); font-size: 12px; color: var(--ink); background: white; outline: none; }
    .add-miembro-row select:focus { border-color: var(--blue-mid); }

    /* ── Msg ── */
    .msg { font-family: var(--mono); font-size: 11px; padding: 6px 10px; border-radius: 4px; margin-top: 4px; display: none; }
    .msg.ok  { background: var(--green-light); color: var(--green); border: 1px solid var(--green); display: block; }
    .msg.err { background: var(--red-light);   color: var(--red);   border: 1px solid var(--red);   display: block; }

    /* ── Empty ── */
    .empty-state { text-align: center; padding: 56px 32px; }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state-title { font-family: var(--serif); font-size: 20px; font-weight: 300; color: var(--ink); margin-bottom: 6px; }
    .empty-state-sub { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }

    .back-link { color: rgba(255,255,255,0.4); font-family: var(--mono); font-size: 11px; text-decoration: none; border: 1px solid rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 4px; }
    .back-link:hover { color: var(--gold-mid); border-color: var(--gold-mid); }

    .presupuesto-val { font-family: var(--mono); font-size: 11px; color: var(--ink-mid); }

    /* ── Modal archivos ── */
    .arch-list { display: flex; flex-direction: column; gap: 8px; }
    .arch-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--paper); border: 1px solid var(--border-light); border-radius: 4px; }
    .arch-icon { font-size: 22px; flex-shrink: 0; }
    .arch-info { flex: 1; min-width: 0; }
    .arch-nombre { font-size: 13px; color: var(--ink); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .arch-meta { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); margin-top: 2px; }
    .arch-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 6px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--paper);
    }
    .upload-area:hover, .upload-area.dragover { border-color: var(--blue-mid); background: var(--blue-light); }
    .upload-area-icon { font-size: 28px; margin-bottom: 8px; }
    .upload-area-text { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
    .upload-area-text strong { color: var(--blue-mid); cursor: pointer; }
    .upload-progress { display: none; margin-top: 10px; }
    .upload-progress.visible { display: block; }
    .prog-bar { height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .prog-bar-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; }
    .upload-msg { font-family: var(--mono); font-size: 11px; margin-top: 6px; }
  </style>
</head>
<body>

<!-- CABECERA -->
<div class="proy-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="brand-seal" style="width:36px;height:36px;font-size:9px;">BOE</div>
    <span style="font-family:var(--serif);font-size:18px;font-weight:300;color:white;">Gestión de Proyectos</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <span style="font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.3);">👤 <span id="usuarioActual"></span></span>
    <a href="/admin.html" class="back-link" id="adminLink" style="display:none">⚙ Admin</a>
    <a href="/index.html" class="back-link">← Buscador</a>
    <button onclick="logout()" style="background:transparent;border:1px solid rgba(192,57,43,0.4);color:rgba(192,57,43,0.7);font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:4px;cursor:pointer;">Salir</button>
  </div>
</div>

<div class="proy-wrap">

  <!-- TOOLBAR -->
  <div class="proy-toolbar">
    <div class="proy-toolbar-left">
      <input type="text" class="proy-search" id="searchInput" placeholder="🔍 Buscar proyecto…" oninput="filtrar()">
      <button class="filter-chip active" data-estado="" onclick="setFiltro(this,'')">Todos</button>
      <button class="filter-chip" data-estado="activo"     onclick="setFiltro(this,'activo')">Activos</button>
      <button class="filter-chip" data-estado="pausado"    onclick="setFiltro(this,'pausado')">Pausados</button>
      <button class="filter-chip" data-estado="completado" onclick="setFiltro(this,'completado')">Completados</button>
    </div>
    <div id="btnNuevoWrap"></div>
  </div>

  <!-- CONTADOR -->
  <div style="font-family:var(--mono);font-size:11px;color:var(--ink-faint);" id="contador"></div>

  <!-- GRID -->
  <div class="proy-grid" id="proyGrid">
    <div style="grid-column:1/-1;padding:40px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--ink-faint);">Cargando proyectos…</div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     MODAL CREAR / EDITAR PROYECTO
═══════════════════════════════════════════════ -->
<div class="modal-backdrop" id="modalProyecto">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modalTitulo">Nuevo proyecto</span>
      <button class="modal-close" onclick="cerrarModal('modalProyecto')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group" style="flex:2;">
          <label>Nombre del proyecto *</label>
          <input type="text" id="pNombre" placeholder="Nombre del proyecto">
        </div>
        <div class="form-group">
          <label>Estado</label>
          <select id="pEstado">
            <option value="activo">Activo</option>
            <option value="pausado">Pausado</option>
            <option value="completado">Completado</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridad</label>
          <select id="pPrioridad">
            <option value="baja">Baja</option>
            <option value="media" selected>Media</option>
            <option value="alta">Alta</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea id="pDesc" placeholder="Descripción del proyecto…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Cliente</label>
          <input type="text" id="pCliente" placeholder="Nombre del cliente">
        </div>
        <div class="form-group">
          <label>Presupuesto (€)</label>
          <input type="number" id="pPresupuesto" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Fecha inicio</label>
          <input type="date" id="pInicio">
        </div>
        <div class="form-group">
          <label>Fecha fin prevista</label>
          <input type="date" id="pFin">
        </div>
      </div>
      <div class="form-group">
        <label>Etiquetas (separadas por comas)</label>
        <input type="text" id="pEtiquetas" placeholder="Ej: BDNS, Subvenciones, 2026">
      </div>
      <div class="msg" id="msgProyecto"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalProyecto')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarProyecto()">💾 Guardar proyecto</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     MODAL GESTIONAR MIEMBROS
═══════════════════════════════════════════════ -->
<div class="modal-backdrop" id="modalMiembros">
  <div class="modal" style="max-width:480px;">
    <div class="modal-head">
      <span class="modal-title" id="modalMiembrosTitulo">Miembros del proyecto</span>
      <button class="modal-close" onclick="cerrarModal('modalMiembros')">✕</button>
    </div>
    <div class="modal-body" style="padding:0;">
      <div class="miembros-section">
        <div class="miembros-section-head">
          <span>Miembros asignados</span>
          <span id="miembrosCount" style="font-size:11px;color:var(--ink-mid);"></span>
        </div>
        <div id="listaMiembros"></div>
      </div>

      <div style="padding:16px 0 0;">
        <div class="miembros-section">
          <div class="miembros-section-head">Añadir miembro</div>
          <div class="add-miembro-row">
            <select id="selectUsuario">
              <option value="">— Selecciona un usuario —</option>
            </select>
            <select id="selectRolMiembro" style="width:140px;flex:none;">
              <option value="miembro">👤 Miembro</option>
              <option value="responsable">⭐ Responsable</option>
            </select>
            <button class="btn btn-sm btn-green" onclick="añadirMiembro()">+ Añadir</button>
          </div>
        </div>
      </div>
      <div class="msg" id="msgMiembros" style="margin:0 16px 8px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalMiembros')">Cerrar</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
const miRol     = sessionStorage.getItem('bdns_rol') || 'usuario';
const esAdmin   = miRol === 'admin';
let todosProyectos = [];
let todosUsuarios  = [];
let filtroEstado   = '';
let proyectoActivo = null; // para modal miembros

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  if (esAdmin) {
    document.getElementById('btnNuevoWrap').innerHTML =
      `<button class="btn btn-primary" onclick="abrirModalNuevo()">＋ Nuevo proyecto</button>`;
    document.getElementById('adminLink').style.display = '';
  }
  await Promise.all([cargarProyectos(), cargarUsuarios()]);
});

// ── Cargar proyectos ──────────────────────────────────────
async function cargarProyectos() {
  const res  = await fetch('/api/proyectos');
  const data = await res.json();
  todosProyectos = Array.isArray(data) ? data : [];
  renderGrid();
}

async function cargarUsuarios() {
  if (!esAdmin) return;
  const res  = await fetch('/api/usuarios');
  todosUsuarios = await res.json();
  // Rellenar select de añadir miembro
  const sel = document.getElementById('selectUsuario');
  sel.innerHTML = '<option value="">— Selecciona un usuario —</option>';
  todosUsuarios.forEach(u => {
    sel.innerHTML += `<option value="${u.id}">${u.usuario}${u.nombre ? ' — '+u.nombre : ''}</option>`;
  });
}

// ── Render grid ───────────────────────────────────────────
function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let lista = todosProyectos.filter(p => {
    const matchEstado = !filtroEstado || p.estado === filtroEstado;
    const matchQ = !q || p.nombre.toLowerCase().includes(q) || (p.descripcion||'').toLowerCase().includes(q) || (p.cliente||'').toLowerCase().includes(q);
    return matchEstado && matchQ;
  });

  document.getElementById('contador').textContent = `${lista.length} proyecto${lista.length !== 1 ? 's' : ''}`;

  if (!lista.length) {
    document.getElementById('proyGrid').innerHTML = `
      <div style="grid-column:1/-1;" class="empty-state">
        <div class="empty-state-icon">📁</div>
        <div class="empty-state-title">Sin proyectos</div>
        <div class="empty-state-sub">${esAdmin ? 'Crea el primer proyecto con el botón de arriba' : 'No hay proyectos disponibles'}</div>
      </div>`;
    return;
  }

  document.getElementById('proyGrid').innerHTML = lista.map(p => tarjetaProyecto(p)).join('');
}

function tarjetaProyecto(p) {
  const ESTADO_STRIPE = { activo:'stripe-activo', pausado:'stripe-pausado', completado:'stripe-completado' };
  const ESTADO_BADGE  = { activo:'badge-green', pausado:'badge-gold', completado:'badge-blue' };
  const PRIOR_BADGE   = { baja:'badge-blue', media:'badge-gold', alta:'badge-red' };

  const miembros = p.miembros || [];
  const maxAv = 4;
  const avatares = miembros.slice(0, maxAv).map(m => {
    const inicial = (m.usuario||'?').charAt(0).toUpperCase();
    const cls = m.rol_proyecto === 'responsable' ? 'responsable' : '';
    return `<span class="miembro-av ${cls}" title="${m.usuario}${m.rol_proyecto==='responsable'?' ⭐':''}">${inicial}</span>`;
  }).join('');
  const extra = miembros.length > maxAv
    ? `<span class="miembro-av miembro-av-more" title="${miembros.length - maxAv} más">+${miembros.length - maxAv}</span>`
    : '';

  const etiquetas = (p.etiquetas||'').split(',').map(e=>e.trim()).filter(Boolean)
    .map(e => `<span class="badge badge-gray">${esc(e)}</span>`).join('');

  const btnAcciones = esAdmin ? `
    <button class="btn btn-sm btn-ghost" onclick="abrirModalEditar(${p.id})">✏ Editar</button>
    <button class="btn btn-sm btn-ghost" onclick="abrirModalMiembros(${p.id})" style="color:var(--blue);">👥 Miembros</button>
    <button class="btn btn-sm btn-ghost" onclick="abrirModalArchivos(${p.id})" style="color:var(--green);">📎 Archivos</button>
    <button class="btn btn-sm btn-danger" onclick="eliminarProyecto(${p.id},'${esc(p.nombre)}')">✕</button>
  ` : `
    <button class="btn btn-sm btn-ghost" onclick="abrirModalMiembros(${p.id})">👥 Ver miembros</button>
    <button class="btn btn-sm btn-ghost" onclick="abrirModalArchivos(${p.id})" style="color:var(--green);">📎 Archivos</button>
  `;

  return `
    <div class="proy-card">
      <div class="proy-card-stripe ${ESTADO_STRIPE[p.estado]||''}"></div>
      <div class="proy-card-body">
        <div class="proy-card-head">
          <div>
            <div class="proy-card-nombre">${esc(p.nombre)}</div>
            ${p.cliente ? `<div class="proy-card-cliente">Cliente: ${esc(p.cliente)}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
            <span class="badge ${ESTADO_BADGE[p.estado]||'badge-gray'}">${p.estado||'—'}</span>
            <span class="badge ${PRIOR_BADGE[p.prioridad]||'badge-gray'}">${p.prioridad||'media'}</span>
          </div>
        </div>
        ${p.descripcion ? `<div class="proy-card-desc">${esc(p.descripcion)}</div>` : ''}
        <div class="proy-card-meta">
          ${p.fecha_inicio||p.fecha_fin ? `<span class="proy-card-fechas">${p.fecha_inicio||'—'} → ${p.fecha_fin||'—'}</span>` : ''}
          ${p.presupuesto ? `<span class="presupuesto-val">€ ${Number(p.presupuesto).toLocaleString('es-ES',{minimumFractionDigits:0})}</span>` : ''}
        </div>
        ${etiquetas ? `<div style="display:flex;gap:4px;flex-wrap:wrap;">${etiquetas}</div>` : ''}
        <div class="miembros-row">
          ${miembros.length ? avatares + extra : '<span class="miembros-empty">Sin miembros asignados</span>'}
        </div>
      </div>
      <div class="proy-card-actions">${btnAcciones}</div>
    </div>`;
}

// ── Filtros ───────────────────────────────────────────────
function setFiltro(btn, estado) {
  filtroEstado = estado;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c === btn));
  renderGrid();
}
function filtrar() { renderGrid(); }

// ── Modal proyecto ────────────────────────────────────────
let editandoId = null;

function abrirModalNuevo() {
  editandoId = null;
  document.getElementById('modalTitulo').textContent = 'Nuevo proyecto';
  ['pNombre','pDesc','pCliente','pPresupuesto','pInicio','pFin','pEtiquetas'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pEstado').value    = 'activo';
  document.getElementById('pPrioridad').value = 'media';
  document.getElementById('msgProyecto').className = 'msg';
  abrirModal('modalProyecto');
}

function abrirModalEditar(id) {
  const p = todosProyectos.find(x => x.id === id);
  if (!p) return;
  editandoId = id;
  document.getElementById('modalTitulo').textContent = 'Editar proyecto';
  document.getElementById('pNombre').value      = p.nombre || '';
  document.getElementById('pDesc').value        = p.descripcion || '';
  document.getElementById('pCliente').value     = p.cliente || '';
  document.getElementById('pPresupuesto').value = p.presupuesto || '';
  document.getElementById('pInicio').value      = p.fecha_inicio || '';
  document.getElementById('pFin').value         = p.fecha_fin || '';
  document.getElementById('pEtiquetas').value   = p.etiquetas || '';
  document.getElementById('pEstado').value      = p.estado || 'activo';
  document.getElementById('pPrioridad').value   = p.prioridad || 'media';
  document.getElementById('msgProyecto').className = 'msg';
  abrirModal('modalProyecto');
}

async function guardarProyecto() {
  const nombre = document.getElementById('pNombre').value.trim();
  if (!nombre) return showMsg('msgProyecto', 'El nombre es obligatorio', 'err');

  const body = {
    nombre,
    descripcion:  document.getElementById('pDesc').value.trim() || null,
    cliente:      document.getElementById('pCliente').value.trim() || null,
    presupuesto:  parseFloat(document.getElementById('pPresupuesto').value) || null,
    fecha_inicio: document.getElementById('pInicio').value || null,
    fecha_fin:    document.getElementById('pFin').value || null,
    etiquetas:    document.getElementById('pEtiquetas').value.trim() || null,
    estado:       document.getElementById('pEstado').value,
    prioridad:    document.getElementById('pPrioridad').value,
  };

  const url    = editandoId ? `/api/proyectos/${editandoId}` : '/api/proyectos';
  const method = editandoId ? 'PATCH' : 'POST';
  const res    = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const data   = await res.json();

  if (data.ok) {
    cerrarModal('modalProyecto');
    await cargarProyectos();
  } else {
    showMsg('msgProyecto', data.error || 'Error al guardar', 'err');
  }
}

async function eliminarProyecto(id, nombre) {
  if (!confirm(`¿Eliminar el proyecto "${nombre}"? Esta acción no se puede deshacer.`)) return;
  const res  = await fetch(`/api/proyectos/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.ok) cargarProyectos();
  else alert(data.error || 'Error al eliminar');
}

// ── Modal miembros ────────────────────────────────────────
async function abrirModalMiembros(id) {
  proyectoActivo = id;
  const p = todosProyectos.find(x => x.id === id);
  document.getElementById('modalMiembrosTitulo').textContent = `Miembros · ${p ? p.nombre : ''}`;
  document.getElementById('msgMiembros').className = 'msg';
  document.getElementById('selectUsuario').value = '';
  await renderMiembros(id);
  abrirModal('modalMiembros');
}

async function renderMiembros(id) {
  const res     = await fetch(`/api/proyectos/${id}/miembros`);
  const miembros = await res.json();

  // Actualizar en caché local
  const proy = todosProyectos.find(x => x.id === id);
  if (proy) proy.miembros = miembros;

  document.getElementById('miembrosCount').textContent = `${miembros.length} miembro${miembros.length !== 1 ? 's' : ''}`;

  if (!miembros.length) {
    document.getElementById('listaMiembros').innerHTML = `<div style="padding:16px;font-family:var(--mono);font-size:11px;color:var(--ink-faint);text-align:center;">Sin miembros asignados</div>`;
    return;
  }

  document.getElementById('listaMiembros').innerHTML = miembros.map(m => `
    <div class="miembro-item">
      <div class="miembro-item-av" style="${m.rol_proyecto==='responsable'?'background:var(--gold);color:var(--ink);':''}">${(m.usuario||'?').charAt(0).toUpperCase()}</div>
      <div class="miembro-item-info">
        <div class="miembro-item-nombre">${esc(m.usuario)}${m.nombre ? ' — '+esc(m.nombre) : ''}</div>
        <div class="miembro-item-rol">${m.rol_proyecto === 'responsable' ? '⭐ Responsable' : '👤 Miembro'}</div>
      </div>
      ${esAdmin ? `<button class="btn btn-sm btn-danger" onclick="quitarMiembro(${m.asignacion_id})">✕</button>` : ''}
    </div>
  `).join('');
}

async function añadirMiembro() {
  const uid  = document.getElementById('selectUsuario').value;
  const rol  = document.getElementById('selectRolMiembro').value;
  if (!uid) return showMsg('msgMiembros', 'Selecciona un usuario', 'err');

  const res  = await fetch(`/api/proyectos/${proyectoActivo}/miembros`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ usuario_id: parseInt(uid), rol_proyecto: rol }),
  });
  const data = await res.json();
  if (data.ok) {
    document.getElementById('selectUsuario').value = '';
    await renderMiembros(proyectoActivo);
    renderGrid();
  } else {
    showMsg('msgMiembros', data.error || 'Error al añadir', 'err');
  }
}

async function quitarMiembro(asignacionId) {
  if (!confirm('¿Quitar este miembro del proyecto?')) return;
  const res  = await fetch(`/api/proyectos/${proyectoActivo}/miembros/${asignacionId}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.ok) { await renderMiembros(proyectoActivo); renderGrid(); }
  else alert(data.error || 'Error al quitar miembro');
}

// ── Helpers ───────────────────────────────────────────────
function abrirModal(id)  { document.getElementById(id).classList.add('open'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = `msg ${type}`;
  setTimeout(() => el.className = 'msg', 4000);
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Cerrar modal al clicar backdrop
document.querySelectorAll('.modal-backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open'); });
});

// ── ARCHIVOS DE PROYECTO ──────────────────────────────────
let proyectoArchivos = null;

async function abrirModalArchivos(id) {
  proyectoArchivos = id;
  const p = todosProyectos.find(x => x.id === id);
  document.getElementById('modalArchivosTitulo').textContent = `Archivos · ${p ? p.nombre : ''}`;
  document.getElementById('uploadProgress').classList.remove('visible');
  document.getElementById('fileInput').value = '';
  abrirModal('modalArchivos');
  await cargarArchivos(id);
}

async function cargarArchivos(id) {
  document.getElementById('listaArchivos').innerHTML =
    '<div style="padding:16px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink-faint);">Cargando…</div>';
  const res  = await fetch(`/api/proyectos/${id}/archivos`);
  const data = await res.json();
  renderArchivos(Array.isArray(data) ? data : []);
}

function renderArchivos(lista) {
  const el = document.getElementById('listaArchivos');
  if (!lista.length) {
    el.innerHTML = '<div style="padding:16px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink-faint);">Sin archivos subidos</div>';
    return;
  }
  el.innerHTML = lista.map(a => {
    const icon  = a.tipo === 'PDF' ? '📕' : a.tipo === 'Word' ? '📘' : '📄';
    const size  = a.tamanyo ? fmtSize(a.tamanyo) : '';
    const fecha = a.created_at ? new Date(a.created_at).toLocaleDateString('es-ES') : '';
    return `
      <div class="arch-item">
        <div class="arch-icon">${icon}</div>
        <div class="arch-info">
          <div class="arch-nombre" title="${esc(a.nombre)}">${esc(a.nombre)}</div>
          <div class="arch-meta">${a.tipo||'Archivo'} · ${size} · ${fecha} · ${esc(a.usuario||'')}</div>
        </div>
        <div class="arch-actions">
          ${a.url ? `<a class="btn btn-sm btn-ghost" href="${esc(a.url)}" target="_blank" download="${esc(a.nombre)}">↓ Descargar</a>` : ''}
          ${esAdmin ? `<button class="btn btn-sm btn-danger" onclick="eliminarArchivo(${a.id})">✕</button>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function subirArchivo(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','doc','docx'].includes(ext)) {
    alert('Solo se permiten archivos PDF y Word (.doc, .docx)');
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
    alert('El archivo supera el límite de 20 MB');
    return;
  }

  const progress = document.getElementById('uploadProgress');
  const msg      = document.getElementById('uploadMsg');
  const fill     = document.getElementById('progBarFill');

  progress.classList.add('visible');
  msg.textContent  = `Subiendo "${file.name}"…`;
  msg.style.color  = 'var(--ink-mid)';
  fill.style.width = '30%';

  const formData = new FormData();
  formData.append('file', file);

  try {
    fill.style.width = '60%';
    const res  = await fetch(`/api/proyectos/${proyectoArchivos}/archivos`, {
      method: 'POST',
      body: formData,
    });
    fill.style.width = '90%';
    const data = await res.json();

    if (data.ok) {
      fill.style.width = '100%';
      msg.textContent  = '✓ Archivo subido correctamente';
      msg.style.color  = 'var(--green)';
      document.getElementById('fileInput').value = '';
      setTimeout(() => {
        progress.classList.remove('visible');
        fill.style.width = '0%';
      }, 2000);
      await cargarArchivos(proyectoArchivos);
    } else {
      fill.style.width = '0%';
      msg.textContent  = data.error || 'Error al subir';
      msg.style.color  = 'var(--red)';
    }
  } catch(e) {
    msg.textContent = 'Error de conexión';
    msg.style.color = 'var(--red)';
  }
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) subirArchivo(file);
}

async function eliminarArchivo(id) {
  if (!confirm('¿Eliminar este archivo? No se puede deshacer.')) return;
  const res  = await fetch(`/api/proyectos/${proyectoArchivos}/archivos/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.ok) cargarArchivos(proyectoArchivos);
  else alert(data.error || 'Error al eliminar');
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}
</script>

<!-- ═══════════════════════════════════════════════
     MODAL ARCHIVOS DE PROYECTO
═══════════════════════════════════════════════ -->
<div class="modal-backdrop" id="modalArchivos">
  <div class="modal" style="max-width:520px;">
    <div class="modal-head">
      <span class="modal-title" id="modalArchivosTitulo">Archivos del proyecto</span>
      <button class="modal-close" onclick="cerrarModal('modalArchivos')">✕</button>
    </div>
    <div class="modal-body">

      <!-- Zona de subida -->
      <div id="uploadSection">
        <div class="upload-area" id="uploadArea"
          onclick="document.getElementById('fileInput').click()"
          ondragover="event.preventDefault();this.classList.add('dragover')"
          ondragleave="this.classList.remove('dragover')"
          ondrop="handleDrop(event)">
          <div class="upload-area-icon">📄</div>
          <div class="upload-area-text">
            Arrastra un archivo aquí o <strong>haz clic para seleccionar</strong><br>
            PDF · Word (.doc, .docx) · Máx. 20 MB
          </div>
        </div>
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" style="display:none" onchange="subirArchivo(this.files[0])">
        <div class="upload-progress" id="uploadProgress">
          <div class="upload-msg" id="uploadMsg">Subiendo…</div>
          <div class="prog-bar"><div class="prog-bar-fill" id="progBarFill" style="width:0%"></div></div>
        </div>
      </div>

      <!-- Lista de archivos -->
      <div style="margin-top:14px;">
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;">Archivos subidos</div>
        <div class="arch-list" id="listaArchivos">
          <div style="padding:16px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink-faint);">Cargando…</div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalArchivos')">Cerrar</button>
    </div>
  </div>
</div>

</body>
</html>
